<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPI Extractor - Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg:        #1a1a2e;
  --panel:     #16213e;
  --card:      #0f172a;
  --input-bg:  #1e293b;
  --border:    #2d3748;
  --text:      #e2e8f0;
  --text-muted:#94a3b8;
  --text-dim:  #64748b;
  --label:     #cbd5e1;
  --title:     #ffffff;
  --slot-bg:   #1e293b;
  --slot-active:#3b82f6;
  --btn-copy:  #3b82f6;
  --btn-clear: #e53e3e;
  --btn-back:  #276749;
  --btn-fwd:   #6b21a8;
  --badge-4pt: #22c55e;
}
.light {
  --bg:        #e8eaf0;
  --panel:     #f1f3f7;
  --card:      #ffffff;
  --input-bg:  #f8f9fc;
  --border:    #c9cdd6;
  --text:      #1a202c;
  --text-muted:#4a5568;
  --text-dim:  #718096;
  --label:     #2d3748;
  --title:     #1a202c;
  --slot-bg:   #dde1ea;
  --slot-active:#3b82f6;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 20px 10px;
  transition: background 0.2s, color 0.2s;
}

.outer {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  width: 100%;
  max-width: 760px;
}

.slots {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  flex-shrink: 0;
  width: 72px;
}
.slot {
  background: var(--slot-bg);
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 600;
  border-radius: 5px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: background 0.1s;
  user-select: none;
}
.slot.active { background: var(--slot-active); color: #fff; border-color: var(--slot-active); }

.panel {
  flex: 1;
  background: var(--panel);
  border-radius: 10px;
  border: 1px solid var(--border);
  overflow: hidden;
}

.panel-header {
  background: var(--card);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.badge-4pt {
  background: var(--badge-4pt);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  text-transform: uppercase;
}
.panel-title {
  font-size: 18px;
  font-weight: 800;
  color: var(--title);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.theme-btn { background: none; border: none; font-size: 22px; cursor: pointer; }

.panel-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

.field label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--label);
  margin-bottom: 5px;
}
.field input, .field select, .field textarea {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  padding: 8px 10px;
  outline: none;
}

.upload-zone {
  border: 2px dashed var(--border);
  border-radius: 8px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  background: var(--input-bg);
}
.upload-zone.drag-over { border-color: var(--slot-active); background: var(--card); }

details.col-map {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 8px 12px;
}
details.col-map summary { font-size: 12px; color: var(--text-dim); cursor: pointer; }
details.col-map table { width: 100%; font-size: 12px; margin-top: 8px; border-collapse: collapse; }
details.col-map td, details.col-map th { padding: 4px; border-bottom: 1px solid var(--border); }
details.col-map input { width: 45px; text-align: center; text-transform: uppercase; }

#start-container {
  display: none;
  padding: 10px;
  background: rgba(59, 130, 246, 0.1);
  border-radius: 8px;
  border: 1px solid var(--slot-active);
  text-align: center;
}
.btn-start {
  background: var(--slot-active);
  color: #fff;
  width: 100%;
  padding: 12px;
  font-weight: 800;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  text-transform: uppercase;
}

#status { font-size: 11px; color: var(--text-dim); min-height: 15px; text-align: center; }

.kpi-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 8px; }
table.kpi { width: 100%; border-collapse: collapse; min-width: 500px; }
table.kpi th { background: var(--card); padding: 10px; font-size: 10px; color: var(--text-dim); }
table.kpi td { padding: 12px; text-align: center; border-bottom: 1px solid var(--bg); font-weight: 800; }
table.kpi td:first-child { text-align: left; background: var(--card); font-size: 11px; }

td.good { background: #052e16 !important; color: #4ade80 !important; }
td.warn { background: #431407 !important; color: #fbbf24 !important; }
td.bad  { background: #3b0007 !important; color: #f87171 !important; }
td.neu  { background: var(--card) !important; color: var(--text-dim) !important; }
td.blank { background: var(--input-bg) !important; color: var(--border) !important; }

.actions { display: flex; gap: 8px; }
.btn { border: none; border-radius: 7px; padding: 10px; cursor: pointer; font-weight: 700; text-transform: uppercase; flex: 1; }
.btn-copy-main { background: var(--btn-copy); color: #fff; }
.btn-clear { background: var(--btn-clear); color: #fff; }
</style>
</head>
<body>

<div class="outer">
  <div class="slots" id="slots"></div>

  <div class="panel">
    <div class="panel-header">
      <span class="badge-4pt">Extraction Mode</span>
      <span class="panel-title">KPI Extractor</span>
      <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>

    <div class="panel-body">
      <div class="field">
        <label>Agent Name :</label>
        <input type="text" id="agent-name" placeholder="Enter name...">
      </div>

      <div class="field">
        <label>Upload Excel :</label>
        <div class="upload-zone" id="drop-zone" onclick="document.getElementById('fin').click()">
          <input type="file" id="fin" hidden onchange="loadFile(this.files[0])">
          <strong id="upload-label">📁 Drag & Drop or Click</strong>
        </div>
      </div>

      <div id="start-container">
        <button class="btn-start" onclick="recompute()">🚀 Start Extracting Total Results</button>
      </div>

      <details class="col-map">
        <summary>⚙️ Column Settings</summary>
        <table>
          <tr><th>Metric</th><th>Col</th></tr>
          <tr><td>FCR</td><td><input id="c-fcr" value="E"></td></tr>
          <tr><td>AHT</td><td><input id="c-aht" value="AR"></td></tr>
          <tr><td>Trans</td><td><input id="c-trans" value="BB"></td></tr>
          <tr><td>OB%</td><td><input id="c-ob" value=""></td></tr>
          <tr><td>NBA</td><td><input id="c-nba" value="FL"></td></tr>
          <tr><td>SOCs</td><td><input id="c-soc" value="DI"></td></tr>
          <tr><td>CPC</td><td><input id="c-cpc" value="DK"></td></tr>
        </table>
      </details>

      <div id="status"></div>

      <div class="kpi-wrap">
        <table class="kpi">
          <thead>
            <tr><th>KPI</th><th>FCR</th><th>AHT</th><th>Trans</th><th>OB%</th><th>NBA</th><th>SOCs</th><th>CPC</th></tr>
          </thead>
          <tbody>
            <tr>
              <td>Target</td>
              <td id="t-fcr">78.7%</td><td id="t-aht">900</td><td id="t-trans">7%</td><td id="t-ob">12%</td><td id="t-nba">25%</td><td id="t-soc">15%</td><td id="t-cpc">£0.37</td>
            </tr>
            <tr>
              <td>Result</td>
              <td id="r-fcr" class="neu">—</td><td id="r-aht" class="neu">—</td><td id="r-trans" class="neu">—</td><td id="r-ob" class="blank">N/A</td><td id="r-nba" class="neu">—</td><td id="r-soc" class="neu">—</td><td id="r-cpc" class="neu">—</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="actions">
        <button class="btn btn-copy-main" onclick="copyTable()">Copy Result</button>
        <button class="btn btn-clear" onclick="location.reload()">Clear All</button>
      </div>
    </div>
  </div>
</div>

<script>
let wb = null;
const targets = {
  fcr:   { raw: 0.787, type: 'pct', higherBetter: true },
  aht:   { raw: 900,   type: 'num', higherBetter: false },
  trans: { raw: 0.07,  type: 'pct', higherBetter: false },
  ob:    { raw: 0.12,  type: 'pct', higherBetter: true },
  nba:   { raw: 0.25,  type: 'pct', higherBetter: true },
  soc:   { raw: 0.15,  type: 'pct', higherBetter: true },
  cpc:   { raw: 0.37,  type: 'gbp', higherBetter: false },
};

function toggleTheme() { document.body.classList.toggle('light'); }

function loadFile(file) {
  if (!file) return;
  document.getElementById('upload-label').textContent = "✅ " + file.name;
  const r = new FileReader();
  r.onload = e => {
    wb = XLSX.read(e.target.result, {type:'array'});
    document.getElementById('start-container').style.display = 'block';
    document.getElementById('status').textContent = "File ready. Click 'Start' below.";
  };
  r.readAsArrayBuffer(file);
}

function colIndex(letters) {
  let n = 0;
  for (let i = 0; i < letters.length; i++) n = n*26 + (letters.toUpperCase().charCodeAt(i)-64);
  return n-1;
}

function getColTotal(ws, col) {
  if (!col) return null;
  const range = XLSX.utils.decode_range(ws['!ref'] || 'A1');
  const ci = colIndex(col);
  let lastNum = null;
  
  for (let r = 0; r <= range.e.r; r++) {
    const cell = ws[XLSX.utils.encode_cell({r, c: ci})];
    if (cell && cell.v !== undefined && cell.v !== null) {
      let val = typeof cell.v === 'number' ? cell.v : parseFloat(String(cell.v).replace(/[£%,\s]/g, ''));
      if (!isNaN(val)) lastNum = val;
    }
  }
  return lastNum;
}

function fmtVal(key, val) {
  if (val === null) return '—';
  if (targets[key].type === 'pct') return (val * 100).toFixed(1) + '%';
  if (targets[key].type === 'gbp') return '£' + val.toFixed(2);
  if (key === 'aht') return Math.floor(val/60) + ":" + String(Math.round(val%60)).padStart(2,'0');
  return Math.round(val).toLocaleString();
}

function colorClass(key, val) {
  if (val === null || key === 'ob') return 'neu';
  const t = targets[key];
  const r = val / t.raw;
  if (t.higherBetter) return r >= 0.97 ? 'good' : r >= 0.88 ? 'warn' : 'bad';
  else return r <= 1.03 ? 'good' : r <= 1.12 ? 'warn' : 'bad';
}

function recompute() {
  if (!wb) return;
  const ws = wb.Sheets[wb.SheetNames[0]];
  const keys = ['fcr','aht','trans','ob','nba','soc','cpc'];
  
  keys.forEach(key => {
    const colLetter = document.getElementById('c-' + key).value;
    const cell = document.getElementById('r-' + key);
    if (key === 'ob') return;
    
    let val = getColTotal(ws, colLetter);
    if (val !== null) {
      // Auto-correct percentage if Excel shows 85 instead of 0.85
      if (targets[key].type === 'pct' && val > 1.5) val = val / 100;
      cell.textContent = fmtVal(key, val);
      cell.className = colorClass(key, val);
    }
  });
  document.getElementById('status').textContent = "Results updated based on column totals.";
}

function copyTable() {
  const agent = document.getElementById('agent-name').value || "Agent";
  let text = `KPI Results for ${agent}\n`;
  ['fcr','aht','trans','ob','nba','soc','cpc'].forEach(k => {
    text += `${k.toUpperCase()}: ${document.getElementById('r-'+k).textContent}\n`;
  });
  navigator.clipboard.writeText(text);
  alert("Results copied to clipboard!");
}
</script>
</body>
</html>
